plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'org.xiph.speex'
version = '0.9.8-SNAPSHOT'

description = "JSpeex - Java port of the Speex speech codec"

sourceCompatibility = 1.8
targetCompatibility = 1.8

repositories {
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['jetbrains-annotations-stub.jar'])
    testImplementation fileTree(dir: 'libs', include: ['junit4-4.13.2.jar', 'hamcrest-core.jar'])
    compileOnly 'org.jetbrains:annotations:24.1.0'
    testCompileOnly 'org.jetbrains:annotations:24.1.0'  // Gradle < 7
    // OR for Gradle 7+:
    testCompileOnly 'org.jetbrains:annotations:24.1.0'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
