name: Build & Release JAR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.9.8). Leave blank to use the latest existing tag.'
        required: false
        default: ''

permissions:
  contents: write   # required to create tags, releases, and upload assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout full history so we can read all tags ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + all tags

      # ── 2. Resolve tag ────────────────────────────────────────────────────
      #   Priority: workflow input → latest semver tag in the repo → abort
      - name: Resolve tag
        id: tag
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"

          if [[ -n "$INPUT_TAG" ]]; then
            echo "Source: workflow input"
            RESOLVED_TAG="$INPUT_TAG"
          else
            # Latest tag by version sort (handles v-prefix and plain numbers)
            RESOLVED_TAG=$(git tag --list \
              | grep -E '^v?[0-9]+\.[0-9]+' \
              | sort -V \
              | tail -n 1)

            if [[ -z "$RESOLVED_TAG" ]]; then
              echo "::error::No tag supplied and no semver tags found in the repository."
              exit 1
            fi
            echo "Source: latest repo tag"
          fi

          echo "Resolved tag: $RESOLVED_TAG"
          echo "value=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"

      # ── 3. Create the tag if it doesn't exist yet ─────────────────────────
      - name: Create tag if missing
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' already exists — skipping creation."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Tag '$TAG' created and pushed."
          fi

      # ── 4. Java & Gradle setup ────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build JAR
        run: ./gradlew build --no-daemon

      # ── 6. Locate the JAR (works regardless of version string in filename) ─
      - name: Locate JAR
        id: jar
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -n 1)
          if [[ -z "$JAR_PATH" ]]; then
            echo "::error::No JAR found under build/libs/"
            exit 1
          fi
          JAR_NAME=$(basename "$JAR_PATH")
          echo "path=$JAR_PATH"   >> "$GITHUB_OUTPUT"
          echo "name=$JAR_NAME"   >> "$GITHUB_OUTPUT"
          echo "Found: $JAR_PATH"

      # ── 7. Create or update the GitHub Release ────────────────────────────
      #   'gh release create' is idempotent with --notes-file when using
      #   an existing tag; '--clobber' replaces assets if the release exists.
      - name: Create / update GitHub Release and upload JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          JAR_PATH="${{ steps.jar.outputs.path }}"
          JAR_NAME="${{ steps.jar.outputs.name }}"

          # Build a concise release body
          NOTES="**Artifact:** \`$JAR_NAME\`
          **Built by:** [@${{ github.actor }}](https://github.com/${{ github.actor }})
          **Commit:** \`${{ github.sha }}\`
          **Workflow run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release '$TAG' exists — uploading / replacing asset."
            # Delete the old asset with the same name if present, then re-upload
            gh release delete-asset "$TAG" "$JAR_NAME" --yes 2>/dev/null || true
            gh release upload "$TAG" "$JAR_PATH" --clobber
          else
            echo "Creating new release '$TAG'."
            gh release create "$TAG" "$JAR_PATH" \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag
          fi
